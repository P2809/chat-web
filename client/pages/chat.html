<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat Web</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: #f4f6f9;
    }

    #chat {
      height: 70vh;
      overflow-y: auto;
      background: white;
      border-radius: 10px;
      padding: 15px;
    }

    .msg {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .me {
      background: #0d6efd;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .other {
      background: #e9ecef;
      color: black;
    }
  </style>
</head>

<body>

<div class="container mt-4">

  <h3 class="text-center mb-3">💬 Chat en Tiempo Real</h3>

  <div id="chat"></div>

  <div class="input-group mt-3">
    <input id="msg" type="text" class="form-control" placeholder="Escribe un mensaje...">
    <button class="btn btn-primary" onclick="enviar()">
      <i class="fa fa-paper-plane"></i>
    </button>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
  const socket = io("http://localhost:3000");
  const chat = document.getElementById("chat");

  const username = localStorage.getItem("username");

  if (!username) {
    window.location.href = "index.html";
  }

  socket.on("mensaje", (data) => {
    const div = document.createElement("div");
    div.classList.add("msg", "other");
    div.innerHTML = `<b>${data.user}:</b> ${data.text}`;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  function enviar() {
    const input = document.getElementById("msg");
    const msg = input.value;

    if (!msg) return;

    const data = {
      user: username,
      text: msg
    };

    const div = document.createElement("div");
    div.classList.add("msg", "me");
    div.innerHTML = `<b>${username}:</b> ${msg}`;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    socket.emit("mensaje", data);

    input.value = "";
  }
</script>

</body>
</html>
