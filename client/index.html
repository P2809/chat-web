<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Chat</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0d6efd;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 350px;
      padding: 20px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<div class="card shadow">
  <h4 class="text-center mb-3">💬 Ingresar al Chat</h4>

  <input id="username" class="form-control mb-3" placeholder="Ingresa tu nombre">

  <button class="btn btn-primary w-100" onclick="entrar()">
    Entrar
  </button>
</div>

<script>
  function entrar() {
    const user = document.getElementById("username").value;

    if (!user) {
      alert("Ingresa un nombre");
      return;
    }

    localStorage.setItem("username", user);

    window.location.href = "chat.html";
  }
</script>

</body>
</html>
